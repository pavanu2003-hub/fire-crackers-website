<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <radialGradient id="bgwo" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#080a20"/>
      <stop offset="100%" stop-color="#040510"/>
    </radialGradient>
    <linearGradient id="boxWo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a50cc"/>
      <stop offset="100%" stop-color="#0a2880"/>
    </linearGradient>
    <linearGradient id="lidWo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2260dd"/>
      <stop offset="100%" stop-color="#1038a0"/>
    </linearGradient>
    <linearGradient id="ribbonWo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe080"/>
      <stop offset="100%" stop-color="#c8960a"/>
    </linearGradient>
    <filter id="glowwo">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bgwo)"/>

  <!-- Background glow -->
  <ellipse cx="300" cy="230" rx="170" ry="110" fill="#1a50cc" opacity="0.1" filter="url(#glowwo)"/>

  <!-- Box shadow -->
  <ellipse cx="302" cy="355" rx="110" ry="14" fill="#000" opacity="0.4"/>

  <!-- Box body -->
  <rect x="175" y="235" width="250" height="115" rx="6" fill="url(#boxWo)"/>
  <rect x="175" y="235" width="250" height="30" rx="6" fill="#fff" opacity="0.07"/>
  <rect x="175" y="235" width="12" height="115" rx="2" fill="#000" opacity="0.15"/>

  <!-- Lid -->
  <rect x="163" y="200" width="274" height="42" rx="6" fill="url(#lidWo)"/>
  <rect x="163" y="200" width="274" height="14" rx="6" fill="#fff" opacity="0.1"/>

  <!-- Ribbons -->
  <rect x="284" y="235" width="32" height="115" fill="url(#ribbonWo)" opacity="0.9"/>
  <rect x="284" y="200" width="32" height="42" fill="url(#ribbonWo)" opacity="0.9"/>
  <rect x="163" y="213" width="274" height="16" fill="url(#ribbonWo)" opacity="0.8"/>

  <!-- Bow -->
  <ellipse cx="278" cy="200" rx="38" ry="22" fill="url(#ribbonWo)" transform="rotate(-25,278,200)"/>
  <ellipse cx="322" cy="200" rx="38" ry="22" fill="url(#ribbonWo)" transform="rotate(25,322,200)"/>
  <circle cx="300" cy="200" r="16" fill="#ffe080"/>
  <circle cx="300" cy="200" r="9" fill="#c8960a"/>

  <!-- Stars on box -->
  <circle cx="215" cy="285" r="3" fill="#fff" opacity="0.3"/>
  <circle cx="250" cy="310" r="2" fill="#fff" opacity="0.2"/>
  <circle cx="380" cy="270" r="3" fill="#fff" opacity="0.3"/>
  <circle cx="350" cy="300" r="2" fill="#fff" opacity="0.2"/>

  <!-- Sparkles -->
  <text x="145" y="185" font-size="22" fill="#f0c040" opacity="0.8" filter="url(#glowwo)">✦</text>
  <text x="430" y="175" font-size="16" fill="#f0c040" opacity="0.6" filter="url(#glowwo)">✦</text>
  <text x="155" y="340" font-size="14" fill="#f0c040" opacity="0.4">✦</text>
  <text x="445" y="345" font-size="18" fill="#f0c040" opacity="0.5">✦</text>

  <!-- Label -->
  <rect x="163" y="358" width="274" height="30" rx="4" fill="#000" opacity="0.3"/>
  <text x="300" y="378" text-anchor="middle" font-family="Georgia,serif" font-size="18" fill="#ffe080" font-weight="bold">Gift Box — WONDERFUL</text>
</svg>
