<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <radialGradient id="bgboom" cx="50%" cy="55%" r="60%">
      <stop offset="0%" stop-color="#2a1000"/>
      <stop offset="100%" stop-color="#0d0500"/>
    </radialGradient>
    <radialGradient id="burstCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#ffee44"/>
      <stop offset="55%" stop-color="#ff6600"/>
      <stop offset="100%" stop-color="#cc1100" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowboom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowboom2" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bgboom)"/>

  <!-- Outer explosion glow -->
  <circle cx="300" cy="195" r="130" fill="#ff4400" opacity="0.12" filter="url(#glowboom2)"/>
  <circle cx="300" cy="195" r="80" fill="#ff8800" opacity="0.18" filter="url(#glowboom2)"/>

  <!-- Explosion rays -->
  <g transform="translate(300,195)" filter="url(#glowboom)">
    <!-- 12 rays radiating outward -->
    <line x1="0" y1="0" x2="0" y2="-140" stroke="#ff8800" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <line x1="0" y1="0" x2="74" y2="-118" stroke="#ffaa00" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <line x1="0" y1="0" x2="121" y2="-70" stroke="#ff6600" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
    <line x1="0" y1="0" x2="140" y2="0" stroke="#ff4400" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <line x1="0" y1="0" x2="121" y2="70" stroke="#ffcc00" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <line x1="0" y1="0" x2="74" y2="118" stroke="#ff8800" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
    <line x1="0" y1="0" x2="0" y2="140" stroke="#ff6600" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <line x1="0" y1="0" x2="-74" y2="118" stroke="#ffaa00" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <line x1="0" y1="0" x2="-121" y2="70" stroke="#ff4400" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
    <line x1="0" y1="0" x2="-140" y2="0" stroke="#ff8800" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <line x1="0" y1="0" x2="-121" y2="-70" stroke="#ffcc00" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <line x1="0" y1="0" x2="-74" y2="-118" stroke="#ff6600" stroke-width="7" stroke-linecap="round" opacity="0.7"/>
    <!-- Diagonal rays (thinner) -->
    <line x1="0" y1="0" x2="38" y2="-132" stroke="#ffdd00" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="0" x2="110" y2="-90" stroke="#ff9900" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="0" x2="132" y2="38" stroke="#ffbb00" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="0" x2="90" y2="110" stroke="#ff7700" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="0" x2="-38" y2="132" stroke="#ffcc00" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="0" x2="-110" y2="90" stroke="#ff9900" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="0" x2="-132" y2="-38" stroke="#ffaa00" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="0" x2="-90" y2="-110" stroke="#ff6600" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Burst core -->
  <circle cx="300" cy="195" r="55" fill="url(#burstCore)" opacity="0.95"/>
  <circle cx="300" cy="195" r="28" fill="#ffffff" opacity="0.9"/>

  <!-- BOOM text -->
  <text x="300" y="208" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="#cc1100" font-weight="bold" letter-spacing="-1">BOOM!</text>

  <!-- Flying debris sparks -->
  <circle cx="180" cy="100" r="4" fill="#ffaa00" opacity="0.8"/>
  <circle cx="430" cy="90" r="3" fill="#ff8800" opacity="0.7"/>
  <circle cx="150" cy="280" r="3" fill="#ffcc00" opacity="0.7"/>
  <circle cx="460" cy="300" r="4" fill="#ff6600" opacity="0.8"/>
  <circle cx="200" cy="330" r="2.5" fill="#ffaa00" opacity="0.6"/>
  <circle cx="410" cy="340" r="2.5" fill="#ffdd00" opacity="0.6"/>
  <circle cx="130" cy="180" r="3" fill="#ff8800" opacity="0.6"/>
  <circle cx="475" cy="175" r="3" fill="#ffcc00" opacity="0.6"/>

  <!-- Label -->
  <text x="300" y="382" text-anchor="middle" font-family="Georgia,serif" font-size="20" fill="#ff6600" font-weight="bold">BOOM — Atom Bomb Cracker</text>
</svg>
