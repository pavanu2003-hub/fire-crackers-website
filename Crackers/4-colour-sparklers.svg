<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <radialGradient id="bg4s" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a2e42"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </radialGradient>
    <filter id="glow4s">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bg4s)"/>

  <!-- Sparkler stick 1 – Red -->
  <line x1="120" y1="370" x2="165" y2="175" stroke="#888" stroke-width="5" stroke-linecap="round"/>
