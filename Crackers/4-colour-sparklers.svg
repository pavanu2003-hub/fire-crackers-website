  <circle cx="145" cy="195" r="1.5" fill="#ff6644" opacity="0.4"/>
  <circle cx="240" cy="200" r="2" fill="#4488ff" opacity="0.5"/>
  <circle cx="355" cy="210" r="2" fill="#44cc66" opacity="0.5"/>
