  <line x1="220" y1="370" x2="230" y2="160" stroke="#888" stroke-width="5" stroke-linecap="round"/>
  <circle cx="230" cy="160" r="7" fill="#4488ff" filter="url(#glow4s)"/>
  <line x1="230" y1="153" x2="200" y2="115" stroke="#4488ff" stroke-width="2" opacity="0.9"/>
  <line x1="230" y1="153" x2="262" y2="112" stroke="#66aaff" stroke-width="2" opacity="0.9"/>
  <line x1="230" y1="153" x2="195" y2="140" stroke="#2266ff" stroke-width="1.5" opacity="0.8"/>
  <line x1="230" y1="153" x2="268" y2="140" stroke="#88ccff" stroke-width="1.5" opacity="0.8"/>
