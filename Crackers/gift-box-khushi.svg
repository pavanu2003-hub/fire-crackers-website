<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <radialGradient id="bgkh" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a180a"/>
      <stop offset="100%" stop-color="#050d05"/>
    </radialGradient>
    <linearGradient id="boxKh" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a9940"/>
      <stop offset="100%" stop-color="#0a5520"/>
    </linearGradient>
    <linearGradient id="lidKh" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22bb50"/>
      <stop offset="100%" stop-color="#106628"/>
    </linearGradient>
    <linearGradient id="ribbonKh" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff080"/>
      <stop offset="100%" stop-color="#e8a820"/>
    </linearGradient>
    <filter id="glowkh">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bgkh)"/>

  <!-- Background glow -->
  <ellipse cx="300" cy="230" rx="170" ry="110" fill="#1a9940" opacity="0.1" filter="url(#glowkh)"/>

  <!-- Box shadow -->
  <ellipse cx="302" cy="355" rx="110" ry="14" fill="#000" opacity="0.4"/>

  <!-- Box body -->
  <rect x="175" y="235" width="250" height="115" rx="6" fill="url(#boxKh)"/>
  <rect x="175" y="235" width="250" height="30" rx="6" fill="#fff" opacity="0.07"/>
  <rect x="175" y="235" width="12" height="115" rx="2" fill="#000" opacity="0.15"/>

  <!-- Polka dots on box -->
  <circle cx="215" cy="270" r="8" fill="#fff" opacity="0.12"/>
  <circle cx="248" cy="300" r="6" fill="#fff" opacity="0.1"/>
  <circle cx="380" cy="265" r="8" fill="#fff" opacity="0.12"/>
  <circle cx="350" cy="298" r="6" fill="#fff" opacity="0.1"/>
  <circle cx="300" cy="315" r="7" fill="#fff" opacity="0.1"/>

  <!-- Lid -->
  <rect x="163" y="200" width="274" height="42" rx="6" fill="url(#lidKh)"/>
  <rect x="163" y="200" width="274" height="14" rx="6" fill="#fff" opacity="0.1"/>

  <!-- Ribbons -->
  <rect x="284" y="235" width="32" height="115" fill="url(#ribbonKh)" opacity="0.9"/>
  <rect x="284" y="200" width="32" height="42" fill="url(#ribbonKh)" opacity="0.9"/>
  <rect x="163" y="213" width="274" height="16" fill="url(#ribbonKh)" opacity="0.8"/>

  <!-- Bow -->
  <ellipse cx="278" cy="200" rx="38" ry="22" fill="url(#ribbonKh)" transform="rotate(-25,278,200)"/>
  <ellipse cx="322" cy="200" rx="38" ry="22" fill="url(#ribbonKh)" transform="rotate(25,322,200)"/>
  <circle cx="300" cy="200" r="16" fill="#fff080"/>
  <circle cx="300" cy="200" r="9" fill="#e8a820"/>

  <!-- Sparkles -->
  <text x="140" y="185" font-size="24" fill="#f0c040" opacity="0.8" filter="url(#glowkh)">✦</text>
  <text x="432" y="178" font-size="16" fill="#f0c040" opacity="0.6" filter="url(#glowkh)">✦</text>
  <text x="150" y="338" font-size="14" fill="#f0c040" opacity="0.4">✦</text>
  <text x="448" y="342" font-size="18" fill="#f0c040" opacity="0.5">✦</text>

  <!-- Label -->
  <rect x="163" y="358" width="274" height="30" rx="4" fill="#000" opacity="0.3"/>
  <text x="300" y="378" text-anchor="middle" font-family="Georgia,serif" font-size="18" fill="#fff080" font-weight="bold">Gift Box — KHUSHI</text>
</svg>
