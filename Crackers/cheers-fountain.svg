<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <radialGradient id="bgche" cx="50%" cy="80%" r="80%">
      <stop offset="0%" stop-color="#0a0a1f"/>
      <stop offset="100%" stop-color="#040410"/>
    </radialGradient>
    <filter id="glowche">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="400" fill="url(#bgche)"/>

  <!-- Fountain base -->
  <polygon points="270,340 330,340 315,295 285,295" fill="#555" />
  <rect x="255" y="340" width="90" height="15" rx="4" fill="#444"/>

  <!-- Fountain body glow -->
  <ellipse cx="300" cy="295" rx="30" ry="12" fill="#ffaa00" opacity="0.4" filter="url(#glowche)"/>

  <!-- Fountain spray streams – each is a curved path of sparks -->

  <!-- Central white-gold stream -->
  <path d="M 300 295 Q 298 220 290 120" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9" filter="url(#glowche)"/>
  <path d="M 300 295 Q 302 215 308 115" stroke="#fffaaa" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8" filter="url(#glowche)"/>

  <!-- Left gold streams -->
  <path d="M 295 295 Q 265 240 230 140" stroke="#f0c040" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.85" filter="url(#glowche)"/>
  <path d="M 292 295 Q 250 250 195 165" stroke="#d4a017" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.75" filter="url(#glowche)"/>
  <path d="M 290 295 Q 240 265 170 195" stroke="#e8a820" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.65" filter="url(#glowche)"/>
  <path d="M 288 298 Q 228 280 155 230" stroke="#c8900a" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5" filter="url(#glowche)"/>

  <!-- Right gold streams -->
  <path d="M 305 295 Q 335 240 368 140" stroke="#f0c040" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.85" filter="url(#glowche)"/>
  <path d="M 308 295 Q 350 250 405 165" stroke="#d4a017" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.75" filter="url(#glowche)"/>
  <path d="M 310 295 Q 360 265 430 195" stroke="#e8a820" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.65" filter="url(#glowche)"/>
  <path d="M 312 298 Q 372 280 445 230" stroke="#c8900a" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5" filter="url(#glowche)"/>

  <!-- Red accent streams -->
  <path d="M 297 295 Q 278 245 248 155" stroke="#ff4444" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.7" filter="url(#glowche)"/>
  <path d="M 303 295 Q 322 245 352 155" stroke="#ff4444" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.7" filter="url(#glowche)"/>

  <!-- Green accent streams -->
  <path d="M 294 296 Q 258 255 212 175" stroke="#44ee44" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6" filter="url(#glowche)"/>
  <path d="M 306 296 Q 342 255 388 175" stroke="#44ee44" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6" filter="url(#glowche)"/>

  <!-- Spark dots at stream tips -->
  <circle cx="290" cy="120" r="4" fill="#fff" opacity="0.9" filter="url(#glowche)"/>
  <circle cx="308" cy="115" r="3.5" fill="#fffaaa" opacity="0.9" filter="url(#glowche)"/>
  <circle cx="230" cy="140" r="3.5" fill="#f0c040" opacity="0.9" filter="url(#glowche)"/>
  <circle cx="368" cy="140" r="3.5" fill="#f0c040" opacity="0.9" filter="url(#glowche)"/>
  <circle cx="195" cy="165" r="3" fill="#d4a017" opacity="0.8"/>
  <circle cx="405" cy="165" r="3" fill="#d4a017" opacity="0.8"/>
  <circle cx="170" cy="195" r="2.5" fill="#e8a820" opacity="0.7"/>
  <circle cx="430" cy="195" r="2.5" fill="#e8a820" opacity="0.7"/>
  <circle cx="248" cy="155" r="3" fill="#ff4444" opacity="0.8"/>
  <circle cx="352" cy="155" r="3" fill="#ff4444" opacity="0.8"/>
  <circle cx="212" cy="175" r="2.5" fill="#44ee44" opacity="0.7"/>
  <circle cx="388" cy="175" r="2.5" fill="#44ee44" opacity="0.7"/>

  <!-- Floating sparks -->
  <circle cx="145" cy="280" r="2" fill="#f0c040" opacity="0.5"/>
  <circle cx="460" cy="260" r="2" fill="#f0c040" opacity="0.5"/>
  <circle cx="120" cy="180" r="1.5" fill="#fff" opacity="0.3"/>
  <circle cx="490" cy="160" r="1.5" fill="#fff" opacity="0.3"/>

  <!-- Label -->
  <text x="300" y="385" text-anchor="middle" font-family="Georgia,serif" font-size="20" fill="#d4a017" font-weight="bold">CHEERS — Golden Fountain</text>
</svg>
